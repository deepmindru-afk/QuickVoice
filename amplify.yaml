version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm
            - pnpm install
        build:
          commands:
            - pnpm turbo run build --filter=web...
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'