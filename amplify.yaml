version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@9.0.0 --activate
            - pnpm install
        build:
          commands:
            - pnpm turbo run build --filter=web...
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'