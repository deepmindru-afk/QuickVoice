name: Server Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/typescript-config/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".npmrc"
      - ".github/workflows/ci.yml"
      - ".github/workflows/server-build.yml"
  workflow_dispatch:

concurrency:
  group: server-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  quality-gate:
    name: Required CI Signal
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build-and-deploy:
    name: Build, Validate, Sign, and Push Server Image
    needs: quality-gate
    runs-on: ubuntu-latest
    environment:
      name: production-server
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate deployment configuration
        env:
          REQUIRED_AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          REQUIRED_AWS_REGION: ${{ env.AWS_REGION }}
          REQUIRED_ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          ECR_REPOSITORY_VARIABLE_NAME: ECR_REPOSITORY
        run: |
          missing=0
          if [ -z "$REQUIRED_AWS_ROLE_ARN" ]; then
            echo "[fail] Missing GitHub repository variable: AWS_ROLE_ARN"
            missing=1
          fi
          if [ -z "$REQUIRED_AWS_REGION" ]; then
            echo "[fail] Missing GitHub repository variable: AWS_REGION"
            missing=1
          fi
          if [ -z "$REQUIRED_ECR_REPOSITORY" ]; then
            echo "[fail] Missing GitHub repository variable: ${ECR_REPOSITORY_VARIABLE_NAME}"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            {
              echo "## Deployment configuration"
              echo "[fail] Missing required GitHub repository variables."
              echo ""
              echo "Set these GitHub repository variables before running this workflow:"
              echo "- AWS_ROLE_ARN"
              echo "- AWS_REGION"
              echo "- ${ECR_REPOSITORY_VARIABLE_NAME}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "## Deployment configuration"
            echo "[ok] Required GitHub repository variables are configured."
            echo "- AWS region: ${REQUIRED_AWS_REGION}"
            echo "- ECR repository variable: ${ECR_REPOSITORY_VARIABLE_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Smoke test pushed image manifest
        env:
          IMAGE_REF: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build.outputs.digest }}
        run: docker buildx imagetools inspect "$IMAGE_REF"

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Rollback metadata
        env:
          IMAGE_TAG: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Rollback metadata"
            echo "- Image tag: ${IMAGE_TAG}"
            echo "- Image digest: ${IMAGE_DIGEST}"
            echo "- Source commit: ${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"
