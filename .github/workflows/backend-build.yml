name: Backend Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "apps/ai/**"
      - "packages/typescript-config/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".npmrc"
      - ".github/workflows/ci.yml"
      - ".github/workflows/backend-build.yml"
  workflow_dispatch:

concurrency:
  group: quickvoice-backend-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  SERVER_ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  AI_ECR_REPOSITORY: ${{ vars.AI_ECR_REPOSITORY }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  SERVER_ECS_CONTAINER_NAME: ${{ vars.SERVER_ECS_CONTAINER_NAME || 'quickvoice-server' }}
  AI_ECS_CONTAINER_NAME: ${{ vars.AI_ECS_CONTAINER_NAME || 'quickvoice-ai' }}

jobs:
  changes:
    name: Detect Backend Changes
    runs-on: self-hosted
    permissions:
      contents: read
    outputs:
      server: ${{ steps.detect.outputs.server }}
      ai: ${{ steps.detect.outputs.ai }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          server_changed=false
          ai_changed=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            server_changed=true
            ai_changed=true
            changed_files="workflow_dispatch"
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")"
            else
              changed_files="$(git diff --name-only "$before" "$GITHUB_SHA")"
            fi

            if echo "$changed_files" | grep -Eq '^(apps/server/|packages/typescript-config/|scripts/|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|\.npmrc$|\.github/workflows/ci\.yml$|\.github/workflows/backend-build\.yml$)'; then
              server_changed=true
            fi

            if echo "$changed_files" | grep -Eq '^(apps/ai/|scripts/|\.github/workflows/ci\.yml$|\.github/workflows/backend-build\.yml$)'; then
              ai_changed=true
            fi
          fi

          {
            echo "server=${server_changed}"
            echo "ai=${ai_changed}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Backend changes"
            echo "- Server changed: ${server_changed}"
            echo "- AI changed: ${ai_changed}"
            echo ""
            echo "Changed files:"
            echo '```'
            echo "$changed_files"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  validate-config:
    name: Validate Deployment Config
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.ai == 'true'
    steps:
      - name: Validate deployment configuration
        env:
          REQUIRED_AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          REQUIRED_AWS_REGION: ${{ env.AWS_REGION }}
          REQUIRED_SERVER_ECR_REPOSITORY: ${{ env.SERVER_ECR_REPOSITORY }}
          REQUIRED_AI_ECR_REPOSITORY: ${{ env.AI_ECR_REPOSITORY }}
          REQUIRED_ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          REQUIRED_ECS_SERVICE: ${{ env.ECS_SERVICE }}
        run: |
          missing=0
          if [ -z "$REQUIRED_AWS_ROLE_ARN" ]; then
            echo "[fail] Missing GitHub repository variable: AWS_ROLE_ARN"
            missing=1
          fi
          if [ -z "$REQUIRED_AWS_REGION" ]; then
            echo "[fail] Missing GitHub repository variable: AWS_REGION"
            missing=1
          fi
          if [ -z "$REQUIRED_SERVER_ECR_REPOSITORY" ]; then
            echo "[fail] Missing GitHub repository variable: ECR_REPOSITORY"
            missing=1
          fi
          if [ -z "$REQUIRED_AI_ECR_REPOSITORY" ]; then
            echo "[fail] Missing GitHub repository variable: AI_ECR_REPOSITORY"
            missing=1
          fi
          if [ -z "$REQUIRED_ECS_CLUSTER" ]; then
            echo "[fail] Missing GitHub repository variable: ECS_CLUSTER"
            missing=1
          fi
          if [ -z "$REQUIRED_ECS_SERVICE" ]; then
            echo "[fail] Missing GitHub repository variable: ECS_SERVICE"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            {
              echo "## Deployment configuration"
              echo "[fail] Missing required GitHub repository variables."
              echo ""
              echo "Set these GitHub repository variables before running this workflow:"
              echo "- AWS_ROLE_ARN"
              echo "- AWS_REGION"
              echo "- ECR_REPOSITORY"
              echo "- AI_ECR_REPOSITORY"
              echo "- ECS_CLUSTER"
              echo "- ECS_SERVICE"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          {
            echo "## Deployment configuration"
            echo "[ok] Required GitHub repository variables are configured."
            echo "- AWS region: ${REQUIRED_AWS_REGION}"
            echo "- Server ECR repository: ${REQUIRED_SERVER_ECR_REPOSITORY}"
            echo "- AI ECR repository: ${REQUIRED_AI_ECR_REPOSITORY}"
            echo "- ECS cluster: ${REQUIRED_ECS_CLUSTER}"
            echo "- ECS service: ${REQUIRED_ECS_SERVICE}"
            echo "- Server ECS container: ${SERVER_ECS_CONTAINER_NAME}"
            echo "- AI ECS container: ${AI_ECS_CONTAINER_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

  build-server:
    name: Build and Push Server Image
    runs-on: self-hosted
    needs: [changes, validate-config]
    if: needs.changes.outputs.server == 'true'
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      image_tag: ${{ steps.image.outputs.image_tag }}
      digest: ${{ steps.server-build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push server Docker image
        id: server-build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.SERVER_ECR_REPOSITORY }}:sha-${{ github.sha }}
          sbom: true
          provenance: true
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max,ignore-error=true

      - name: Export server image metadata
        id: image
        env:
          IMAGE_TAG: ${{ steps.login-ecr.outputs.registry }}/${{ env.SERVER_ECR_REPOSITORY }}:sha-${{ github.sha }}
          IMAGE_DIGEST: ${{ steps.server-build.outputs.digest }}
        run: |
          set -euo pipefail
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_TAG%@*}@${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Smoke test pushed server image manifest
        env:
          SERVER_IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: docker buildx imagetools inspect "$SERVER_IMAGE_URI"

  build-ai:
    name: Build and Push AI Image
    runs-on: self-hosted
    needs: [changes, validate-config]
    if: needs.changes.outputs.ai == 'true'
    permissions:
      id-token: write
      contents: read
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
      image_tag: ${{ steps.image.outputs.image_tag }}
      digest: ${{ steps.ai-build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push AI Docker image
        id: ai-build
        uses: docker/build-push-action@v6
        with:
          context: apps/ai
          file: apps/ai/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AI_ECR_REPOSITORY }}:sha-${{ github.sha }}
          sbom: true
          provenance: true
          cache-from: type=gha,scope=ai
          cache-to: type=gha,scope=ai,mode=max,ignore-error=true

      - name: Export AI image metadata
        id: image
        env:
          IMAGE_TAG: ${{ steps.login-ecr.outputs.registry }}/${{ env.AI_ECR_REPOSITORY }}:sha-${{ github.sha }}
          IMAGE_DIGEST: ${{ steps.ai-build.outputs.digest }}
        run: |
          set -euo pipefail
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_TAG%@*}@${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Smoke test pushed AI image manifest
        env:
          AI_IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: docker buildx imagetools inspect "$AI_IMAGE_URI"

  deploy:
    name: Deploy Backend Images to ECS
    runs-on: self-hosted
    needs: [changes, validate-config, build-server, build-ai]
    if: |
      always()
      && (needs.changes.outputs.server == 'true' || needs.changes.outputs.ai == 'true')
      && (needs.validate-config.result == 'success')
      && (needs.build-server.result == 'success' || needs.build-server.result == 'skipped')
      && (needs.build-ai.result == 'success' || needs.build-ai.result == 'skipped')
    environment:
      name: production-backend
    permissions:
      id-token: write
      contents: read
    outputs:
      task_definition: ${{ steps.deploy.outputs.task_definition }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy image(s) to ECS
        id: deploy
        env:
          SERVER_CHANGED: ${{ needs.changes.outputs.server }}
          AI_CHANGED: ${{ needs.changes.outputs.ai }}
          SERVER_IMAGE_URI: ${{ needs.build-server.outputs.image_uri }}
          AI_IMAGE_URI: ${{ needs.build-ai.outputs.image_uri }}
        run: |
          set -euo pipefail

          current_task_definition_arn="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$current_task_definition_arn" \
            --query taskDefinition \
            > task-definition.json

          check_container() {
            local container="$1"
            if ! jq -e --arg container "$container" \
              '.containerDefinitions[] | select(.name == $container)' task-definition.json > /dev/null; then
              echo "[fail] Container '${container}' was not found in ${current_task_definition_arn}"
              exit 1
            fi
          }

          if [ "$SERVER_CHANGED" = "true" ]; then
            check_container "$SERVER_ECS_CONTAINER_NAME"
            if [ -z "$SERVER_IMAGE_URI" ]; then
              echo "[fail] Missing server image digest"
              exit 1
            fi
          fi

          if [ "$AI_CHANGED" = "true" ]; then
            check_container "$AI_ECS_CONTAINER_NAME"
            if [ -z "$AI_IMAGE_URI" ]; then
              echo "[fail] Missing AI image digest"
              exit 1
            fi
          fi

          jq \
            --arg server_changed "$SERVER_CHANGED" \
            --arg server_container "$SERVER_ECS_CONTAINER_NAME" \
            --arg server_image "$SERVER_IMAGE_URI" \
            --arg ai_changed "$AI_CHANGED" \
            --arg ai_container "$AI_ECS_CONTAINER_NAME" \
            --arg ai_image "$AI_IMAGE_URI" '
            .containerDefinitions |= map(
              if ($server_changed == "true" and .name == $server_container) then .image = $server_image
              elif ($ai_changed == "true" and .name == $ai_container) then .image = $ai_image
              else . end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' task-definition.json > new-task-definition.json

          new_task_definition_arn="$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$new_task_definition_arn" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

          echo "task_definition=${new_task_definition_arn}" >> "$GITHUB_OUTPUT"

          {
            echo "## ECS deployment"
            echo "- Cluster: ${ECS_CLUSTER}"
            echo "- Service: ${ECS_SERVICE}"
            echo "- Previous task definition: ${current_task_definition_arn}"
            echo "- New task definition: ${new_task_definition_arn}"
            if [ "$SERVER_CHANGED" = "true" ]; then
              echo "- Server container: ${SERVER_ECS_CONTAINER_NAME}"
              echo "- Server image: ${SERVER_IMAGE_URI}"
            fi
            if [ "$AI_CHANGED" = "true" ]; then
              echo "- AI container: ${AI_ECS_CONTAINER_NAME}"
              echo "- AI image: ${AI_IMAGE_URI}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  scan-server:
    name: Scan Server Image
    runs-on: self-hosted
    needs: [changes, build-server]
    if: needs.changes.outputs.server == 'true' && needs.build-server.result == 'success'
    steps:
      - name: Scan server image for vulnerabilities
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ needs.build-server.outputs.image_uri }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          timeout: 20m0s
          exit-code: "1"

      - name: Report server scan warning
        if: steps.trivy.outcome == 'failure'
        run: |
          echo "::warning::Server image vulnerability scan reported findings or could not complete."
          {
            echo "## Server image scan"
            echo "[warn] Advisory scan reported findings or could not complete."
            echo "- Image: ${{ needs.build-server.outputs.image_uri }}"
          } >> "$GITHUB_STEP_SUMMARY"

  scan-ai:
    name: Scan AI Image
    runs-on: self-hosted
    needs: [changes, build-ai]
    if: needs.changes.outputs.ai == 'true' && needs.build-ai.result == 'success'
    steps:
      - name: Scan AI image for vulnerabilities
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ needs.build-ai.outputs.image_uri }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          timeout: 20m0s
          exit-code: "1"

      - name: Report AI scan warning
        if: steps.trivy.outcome == 'failure'
        run: |
          echo "::warning::AI image vulnerability scan reported findings or could not complete."
          {
            echo "## AI image scan"
            echo "[warn] Advisory scan reported findings or could not complete."
            echo "- Image: ${{ needs.build-ai.outputs.image_uri }}"
          } >> "$GITHUB_STEP_SUMMARY"

  sign-server:
    name: Sign Server Image
    runs-on: self-hosted
    needs: [changes, build-server]
    if: needs.changes.outputs.server == 'true' && needs.build-server.result == 'success'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install cosign
        id: cosign-install
        continue-on-error: true
        uses: sigstore/cosign-installer@v3

      - name: Sign server image
        env:
          COSIGN_EXPERIMENTAL: "true"
          SERVER_IMAGE_URI: ${{ needs.build-server.outputs.image_uri }}
        run: |
          if ! command -v cosign >/dev/null 2>&1; then
            echo "::warning::Cosign is unavailable; skipping server image signing."
            exit 0
          fi

          if ! cosign sign --yes "$SERVER_IMAGE_URI"; then
            echo "::warning::Server image signing failed; deployment is already decoupled from advisory signing."
            {
              echo "## Server image signing"
              echo "[warn] Signing failed or could not complete."
              echo "- Image: ${SERVER_IMAGE_URI}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  sign-ai:
    name: Sign AI Image
    runs-on: self-hosted
    needs: [changes, build-ai]
    if: needs.changes.outputs.ai == 'true' && needs.build-ai.result == 'success'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install cosign
        id: cosign-install
        continue-on-error: true
        uses: sigstore/cosign-installer@v3

      - name: Sign AI image
        env:
          COSIGN_EXPERIMENTAL: "true"
          AI_IMAGE_URI: ${{ needs.build-ai.outputs.image_uri }}
        run: |
          if ! command -v cosign >/dev/null 2>&1; then
            echo "::warning::Cosign is unavailable; skipping AI image signing."
            exit 0
          fi

          if ! cosign sign --yes "$AI_IMAGE_URI"; then
            echo "::warning::AI image signing failed; deployment is already decoupled from advisory signing."
            {
              echo "## AI image signing"
              echo "[warn] Signing failed or could not complete."
              echo "- Image: ${AI_IMAGE_URI}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  rollback-metadata:
    name: Rollback Metadata
    runs-on: self-hosted
    needs: [changes, build-server, build-ai, deploy]
    if: |
      always()
      && needs.deploy.result == 'success'
      && (needs.changes.outputs.server == 'true' || needs.changes.outputs.ai == 'true')
    steps:
      - name: Write rollback metadata
        env:
          SERVER_CHANGED: ${{ needs.changes.outputs.server }}
          AI_CHANGED: ${{ needs.changes.outputs.ai }}
          SERVER_IMAGE_TAG: ${{ needs.build-server.outputs.image_tag }}
          AI_IMAGE_TAG: ${{ needs.build-ai.outputs.image_tag }}
          SERVER_IMAGE_DIGEST: ${{ needs.build-server.outputs.digest }}
          AI_IMAGE_DIGEST: ${{ needs.build-ai.outputs.digest }}
          TASK_DEFINITION: ${{ needs.deploy.outputs.task_definition }}
        run: |
          {
            echo "## Rollback metadata"
            echo "- Source commit: ${GITHUB_SHA}"
            echo "- ECS task definition: ${TASK_DEFINITION}"
            if [ "$SERVER_CHANGED" = "true" ]; then
              echo "- Server image tag: ${SERVER_IMAGE_TAG}"
              echo "- Server image digest: ${SERVER_IMAGE_DIGEST}"
            fi
            if [ "$AI_CHANGED" = "true" ]; then
              echo "- AI image tag: ${AI_IMAGE_TAG}"
              echo "- AI image digest: ${AI_IMAGE_DIGEST}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
